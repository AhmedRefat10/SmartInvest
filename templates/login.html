{% extends "base.html" %} {% block title %}Login — SmartInvest{% endblock %} {%
block content %}
<div class="auth-page">
  <div class="card auth-card">
    <div class="auth-header">
      <h2 data-i18n="login_title">Welcome Back</h2>
      <p data-i18n="login_subtitle">
        Sign in to access your investment dashboard.
      </p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email" data-i18n="login_email"
          >Email Address</label
        >
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          placeholder="you@example.com"
          data-i18n-placeholder="login_email_ph"
          autocomplete="email"
          required
        />
        <div class="form-error" id="email-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password" data-i18n="login_password"
          >Password</label
        >
        <div class="password-toggle">
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Your password"
            data-i18n-placeholder="login_password_ph"
            autocomplete="current-password"
            required
          />
          <button
            type="button"
            class="toggle-eye"
            data-target="password"
            aria-label="Toggle password"
          >
            👁
          </button>
        </div>
        <div class="form-error" id="password-error"></div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        style="width: 100%; margin-top: 0.5rem"
      >
        <span class="btn-text" data-i18n="login_submit">Sign In</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <span data-i18n="login_no_account">Don't have an account?</span>
      <a href="/register" data-i18n="login_create">Create one here</a>
    </div>
  </div>
</div>
{% endblock %} {% block extra_scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
